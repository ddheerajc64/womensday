<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gateway - For Chahat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #f8c983; 
            --pink: #e55d87; 
            --dark-bg: #030108; 
            --text: #fff;
        }

        body { 
            margin: 0; 
            background-color: var(--dark-bg); 
            color: var(--text); 
            font-family: 'Lato', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            position: relative;
        }

        /* Cosmic Canvas Background */
        #star-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* The Glassmorphism Console */
        .login-box { 
            background: rgba(15, 8, 25, 0.4); 
            padding: 60px 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(248, 201, 131, 0.15); 
            text-align: center; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(229, 93, 135, 0.05); 
            width: 85%; max-width: 380px; 
            z-index: 10;
            opacity: 0;
            animation: boxEnter 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes boxEnter {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--text); 
            letter-spacing: 6px; 
            margin-bottom: 5px; 
            font-weight: 400; 
            font-size: 26px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        
        .hint { font-size: 11px; color: var(--gold); letter-spacing: 3px; margin-bottom: 40px; font-weight: 300; text-transform: uppercase; opacity: 0.8;}
        
        input { 
            width: 100%; padding: 15px 0; background: transparent; 
            border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.2); 
            color: white; font-size: 20px; text-align: center; 
            outline: none; letter-spacing: 6px; font-family: 'Lato', sans-serif;
            transition: all 0.4s; 
        }
        
        input:focus { 
            border-bottom: 1px solid var(--gold); 
            box-shadow: 0 15px 15px -15px rgba(248, 201, 131, 0.5);
        }
        
        input::placeholder { color: rgba(255,255,255,0.1); font-size: 14px; letter-spacing: 4px; }
        
        button { 
            margin-top: 50px; padding: 16px 40px; width: 100%; 
            background: transparent; color: var(--text); 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 30px; cursor: pointer; font-size: 12px; 
            letter-spacing: 4px; font-weight: bold;
            transition: all 0.4s ease; 
            text-transform: uppercase;
        }
        
        button:hover { 
            background: var(--text); 
            color: var(--dark-bg); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); 
            transform: translateY(-2px);
        }
        
        #error-msg { 
            color: var(--pink); margin-top: 25px; font-size: 12px; 
            letter-spacing: 2px; display: none; animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            font-weight: 400; text-shadow: 0 0 10px rgba(229, 93, 135, 0.5);
        }
        
        @keyframes shake { 
            10%, 90% { transform: translate3d(-1px, 0, 0); } 
            20%, 80% { transform: translate3d(2px, 0, 0); } 
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 
            40%, 60% { transform: translate3d(4px, 0, 0); } 
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    
    <canvas id="star-canvas"></canvas>

    <div class="login-box">
        <h2>IDENTIFY</h2>
        <div class="hint">Awaiting Cosmic Alignment</div>
        <input type="password" id="passcode" placeholder="••••••" autocomplete="off">
        <button id="enter-btn">Initiate Sequence</button>
        <div id="error-msg">Alignment Failed. Try Again.</div>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * width, y: Math.random() * height,
                radius: Math.random() * 1.5,
                vx: Math.floor(Math.random() * 50) - 25, vy: Math.floor(Math.random() * 50) - 25,
                alpha: Math.random()
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            for (let s of stars) {
                ctx.globalAlpha = s.alpha;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, 2 * Math.PI);
                ctx.fill();
                s.x += s.vx / 60; s.y += s.vy / 60;
                s.alpha += (Math.random() - 0.5) * 0.05;
                if(s.alpha < 0) s.alpha = 0; if(s.alpha > 1) s.alpha = 1;
                if (s.x < 0 || s.x > width) s.vx = -s.vx;
                if (s.y < 0 || s.y > height) s.vy = -s.vy;
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDfs0BvDVWG0-p3_D0VI_9GA0gkRxg4tg",
            authDomain: "login-page-64.firebaseapp.com",
            projectId: "login-page-64",
            storageBucket: "login-page-64.firebasestorage.app",
            messagingSenderId: "356749175989",
            appId: "1:356749175989:web:61f3e3a95f7014ae9ce2fc",
            measurementId: "G-X1Q4QLER72",
            databaseURL: "https://login-page-64-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = "Unknown OS"; let browser = "Unknown Browser";
            if (ua.indexOf("Win")!=-1) os="Windows"; if (ua.indexOf("Mac")!=-1) os="MacOS"; if (ua.indexOf("iPhone")!=-1) os="iOS"; if (ua.indexOf("Android")!=-1) os="Android";
            if (ua.indexOf("Chrome")!=-1) browser="Chrome"; else if (ua.indexOf("Safari")!=-1) browser="Safari"; else if (ua.indexOf("Firefox")!=-1) browser="Firefox";
            return { os, browser };
        }

        function pushLog(action, details) {
            database.ref('tracking/logs').push({ timestamp: Date.now(), action: action, details: details });
        }

        function checkLogin() {
            const pass = document.getElementById("passcode").value.trim().toUpperCase();
            const btn = document.getElementById("enter-btn");
            const device = getDeviceInfo();
            
            if (pass === "CHAHAT" || pass === "CHAHAT JAIN") {
                // Success state transition
                btn.innerText = "HYPERSPACE..."; 
                btn.style.background = "var(--gold)";
                btn.style.color = "var(--dark-bg)";
                btn.style.borderColor = "var(--gold)";
                btn.style.pointerEvents = "none";
                document.querySelector('.login-box').style.transform = "scale(1.1)";
                document.querySelector('.login-box').style.opacity = "0";
                document.querySelector('.login-box').style.transition = "all 1s cubic-bezier(0.2, 0.8, 0.2, 1)";
                
                database.ref('tracking/overview/totalVisits').set(firebase.database.ServerValue.increment(1));
                database.ref('tracking/overview/lastLoginFull').set(new Date().toISOString());
                database.ref('tracking/overview/lastOS').set(device.os);
                database.ref('tracking/overview/lastBrowser').set(device.browser);

                pushLog("Successful Login", `Password used: ${pass}`);

                sessionStorage.setItem("universe_access", "granted");
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } else {
                pushLog("Failed Login Attempt", `Tried password: ${pass}`);
                const errorObj = document.getElementById("error-msg");
                errorObj.style.display = "block"; 
                document.getElementById("passcode").value = "";
                
                // Re-trigger shake animation
                errorObj.style.animation = 'none'; 
                errorObj.offsetHeight; 
                errorObj.style.animation = null; 
            }
        }

        document.getElementById("enter-btn").addEventListener("click", checkLogin);
        document.getElementById("passcode").addEventListener("keypress", (e) => { 
            if (e.key === "Enter") { e.preventDefault(); checkLogin(); } 
        });
        
        pushLog("Page Visit", "Arrived at Cosmic Gateway");
    </script>
</body>
</html>
