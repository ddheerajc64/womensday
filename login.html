<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enter - For Chahat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-top: #1a0b2e; 
            --bg-mid: #4b1d52; 
            --bg-bottom: #e55d87;
            --gold: #f8c983;
            --text-main: #fcfcfc;
        }

        body { 
            margin: 0; 
            background: linear-gradient(-45deg, var(--bg-top), var(--bg-mid), var(--bg-bottom), #2a0845);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main); 
            font-family: 'Lato', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient Glowing Orbs in Background */
        .orb {
            position: absolute; border-radius: 50%; background: var(--gold);
            filter: blur(60px); opacity: 0.15; z-index: 0;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; top: -50px; left: -50px; animation-duration: 25s; }
        .orb-2 { width: 400px; height: 400px; bottom: -100px; right: -50px; animation-duration: 20s; animation-direction: alternate-reverse; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* The Glassmorphism Login Box */
        .login-box { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 60px 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            text-align: center; 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.02); 
            width: 85%; max-width: 380px; 
            z-index: 10;
            
            /* Entrance and Breathing Animation */
            opacity: 0;
            animation: boxEnter 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards, boxBreathe 6s ease-in-out infinite 1.5s;
        }

        @keyframes boxEnter {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes boxBreathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--gold); 
            letter-spacing: 4px; 
            margin-bottom: 5px; 
            font-weight: 400; 
            font-size: 28px;
        }
        
        .hint { font-size: 13px; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 40px; font-weight: 300; }
        
        input { 
            width: 100%; padding: 15px 0; background: transparent; 
            border: none; border-bottom: 1px solid rgba(248, 201, 131, 0.3); 
            color: white; font-size: 22px; text-align: center; 
            outline: none; letter-spacing: 4px; font-family: 'Lato', sans-serif;
            transition: border-color 0.4s, box-shadow 0.4s; 
        }
        
        input:focus { 
            border-bottom: 1px solid var(--gold); 
            box-shadow: 0 10px 10px -10px rgba(248, 201, 131, 0.3);
        }
        
        input::placeholder { color: rgba(255,255,255,0.15); font-size: 16px; letter-spacing: 6px; }
        
        button { 
            margin-top: 50px; padding: 16px 40px; width: 100%; 
            background: transparent; color: var(--gold); 
            border: 1px solid var(--gold); 
            border-radius: 30px; cursor: pointer; font-size: 13px; 
            letter-spacing: 3px; font-weight: 400;
            transition: all 0.4s ease; 
        }
        
        button:hover { 
            background: var(--gold); 
            color: var(--bg-top); 
            box-shadow: 0 0 20px rgba(248, 201, 131, 0.4); 
            transform: translateY(-2px);
        }
        
        #error-msg { 
            color: #ff8b8b; margin-top: 25px; font-size: 13px; 
            letter-spacing: 1px; display: none; animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            font-weight: 300;
        }
        
        @keyframes shake { 
            10%, 90% { transform: translate3d(-1px, 0, 0); } 
            20%, 80% { transform: translate3d(2px, 0, 0); } 
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 
            40%, 60% { transform: translate3d(4px, 0, 0); } 
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-box">
        <h2>FOR CHAHAT</h2>
        <div class="hint">ENTER YOUR NAME</div>
        <input type="password" id="passcode" placeholder="••••••" autocomplete="off">
        <button id="enter-btn">ENTER UNIVERSE</button>
        <div id="error-msg">Incorrect. Please try again.</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDfs0BvDVWG0-p3_D0VI_9GA0gkRxg4tg",
            authDomain: "login-page-64.firebaseapp.com",
            projectId: "login-page-64",
            storageBucket: "login-page-64.firebasestorage.app",
            messagingSenderId: "356749175989",
            appId: "1:356749175989:web:61f3e3a95f7014ae9ce2fc",
            measurementId: "G-X1Q4QLER72",
            databaseURL: "https://login-page-64-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let os = "Unknown OS"; let browser = "Unknown Browser";
            if (ua.indexOf("Win")!=-1) os="Windows"; if (ua.indexOf("Mac")!=-1) os="MacOS"; if (ua.indexOf("iPhone")!=-1) os="iOS"; if (ua.indexOf("Android")!=-1) os="Android";
            if (ua.indexOf("Chrome")!=-1) browser="Chrome"; else if (ua.indexOf("Safari")!=-1) browser="Safari"; else if (ua.indexOf("Firefox")!=-1) browser="Firefox";
            return { os, browser };
        }

        function pushLog(action, details) {
            database.ref('tracking/logs').push({ timestamp: Date.now(), action: action, details: details });
        }

        function checkLogin() {
            const pass = document.getElementById("passcode").value.trim().toUpperCase();
            const btn = document.getElementById("enter-btn");
            const device = getDeviceInfo();
            
            if (pass === "CHAHAT" || pass === "CHAHAT JAIN") {
                // Beautiful success state transition
                btn.innerText = "OPENING..."; 
                btn.style.background = "var(--gold)";
                btn.style.color = "var(--bg-top)";
                btn.style.pointerEvents = "none";
                document.querySelector('.login-box').style.transform = "scale(1.05)";
                document.querySelector('.login-box').style.opacity = "0";
                document.querySelector('.login-box').style.transition = "all 0.8s ease";
                
                database.ref('tracking/overview/totalVisits').set(firebase.database.ServerValue.increment(1));
                database.ref('tracking/overview/lastLoginFull').set(new Date().toISOString());
                database.ref('tracking/overview/lastOS').set(device.os);
                database.ref('tracking/overview/lastBrowser').set(device.browser);

                pushLog("Successful Login", `Password used: ${pass}`);

                sessionStorage.setItem("universe_access", "granted");
                setTimeout(() => { window.location.href = "index.html"; }, 800);
            } else {
                pushLog("Failed Login Attempt", `Tried password: ${pass}`);
                const errorObj = document.getElementById("error-msg");
                errorObj.style.display = "block"; 
                document.getElementById("passcode").value = "";
                
                // Re-trigger shake animation
                errorObj.style.animation = 'none'; 
                errorObj.offsetHeight; 
                errorObj.style.animation = null; 
            }
        }

        document.getElementById("enter-btn").addEventListener("click", checkLogin);
        document.getElementById("passcode").addEventListener("keypress", (e) => { 
            if (e.key === "Enter") { e.preventDefault(); checkLogin(); } 
        });
        
        pushLog("Page Visit", "Arrived at Login Screen");
    </script>
</body>
</html>
