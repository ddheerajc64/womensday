<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe Command Center</title>

    <meta http-equiv="refresh" content="300">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --bg-top: #0a0514; 
            --bg-bottom: #010005;
            --gold: #f8c983;
            --pink: #e55d87;
            --cyan: #00f3ff;
            --text-main: #fcfcfc;
            --panel: rgba(25, 15, 35, 0.6);
            --panel-border: rgba(248, 201, 131, 0.15);
        }

        /* CRITICAL: Prevents the entire page from sliding side-to-side on mobile */
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; padding: 0; 
            max-width: 100vw; overflow-x: hidden; 
        }

        body { 
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: 'Lato', sans-serif; 
            padding: 20px; 
            display: flex; justify-content: center; min-height: 100vh; 
        }

        .dashboard { 
            width: 100%; max-width: 1100px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            align-items: start;
        }

        /* --- HEADER --- */
        .header { 
            grid-column: 1 / -1; text-align: center; margin-bottom: 10px; 
            border-bottom: 1px solid var(--panel-border); padding-bottom: 20px; 
            width: 100%;
        }
        
        .header h1 { 
            margin: 0; color: var(--gold); letter-spacing: 4px; 
            font-family: 'Playfair Display', serif; font-weight: 400; font-size: clamp(24px, 4vw, 32px);
        }
        
        .header p { margin: 10px 0 0 0; color: rgba(255,255,255,0.7); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        /* Status Dot */
        .status-dot { width: 10px; height: 10px; background-color: rgba(255,255,255,0.3); border-radius: 50%; transition: all 0.4s ease; }
        .status-dot.online { background-color: var(--gold); box-shadow: 0 0 15px var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; box-shadow: 0 0 5px var(--gold); } 50% { opacity: 1; box-shadow: 0 0 20px var(--gold); transform: scale(1.2); } }

        /* --- CARDS --- */
        .card { 
            background: var(--panel); border: 1px solid var(--panel-border); 
            border-radius: 15px; padding: 25px 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
            width: 100%; min-width: 0; /* CRITICAL FIX: Stops cards from stretching past the screen */
        }
        
        .card h3 { margin: 0 0 10px 0; font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 3px; font-weight: 700; width: 100%; }
        .value { font-size: clamp(28px, 4vw, 40px); font-weight: 400; color: white; font-family: 'Playfair Display', serif; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .sub-value { font-size: 12px; color: var(--gold); margin-top: 8px; letter-spacing: 1px; font-style: italic; }

        /* --- WIDE LOG SECTION --- */
        .card.wide { 
            grid-column: 1 / -1; align-items: stretch; text-align: left; 
            height: 500px; padding: 25px; display: flex; flex-direction: column; 
        }
        
        .log-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; width: 100%; }
        .log-header-row h3 { margin: 0; font-size: 14px; color: var(--text-main); }
        
        /* Category Filter Dropdown */
        .glass-select {
            background: rgba(0, 0, 0, 0.4); border: 1px solid var(--gold);
            color: var(--gold); padding: 10px 20px; border-radius: 30px;
            font-family: 'Lato', sans-serif; font-size: 12px; letter-spacing: 2px;
            outline: none; cursor: pointer; text-transform: uppercase; font-weight: bold;
            appearance: none; -webkit-appearance: none;
            box-shadow: 0 0 15px rgba(248, 201, 131, 0.1);
        }
        .glass-select option { background: var(--bg-top); color: white; }

        /* --- TABLE & LOGS --- */
        .log-container { 
            width: 100%; flex-grow: 1; 
            overflow-y: auto; overflow-x: auto; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .log-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(248, 201, 131, 0.3); border-radius: 6px; }
        .log-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        
        table { width: 100%; border-collapse: collapse; min-width: 650px; font-size: 14px; }
        th { text-align: left; padding: 15px 10px; color: var(--gold); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; background: rgba(10, 5, 20, 0.95); backdrop-filter: blur(10px); z-index: 10; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); line-height: 1.5; vertical-align: top; }
        
        .log-time { color: rgba(255,255,255,0.4); font-size: 12px; white-space: nowrap; }
        .log-action { color: white; font-family: 'Playfair Display', serif; font-size: 16px; font-style: italic; }
        .log-details { font-size: 13px; color: rgba(255,255,255,0.6); }

        .cat-badge { padding: 5px 10px; border-radius: 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; white-space: nowrap; display: inline-block; }
        .cat-system { background: rgba(0, 243, 255, 0.1); border: 1px solid rgba(0, 243, 255, 0.3); color: var(--cyan); }
        .cat-media { background: rgba(248, 201, 131, 0.1); border: 1px solid rgba(248, 201, 131, 0.3); color: var(--gold); }
        .cat-interaction { background: rgba(229, 93, 135, 0.1); border: 1px solid rgba(229, 93, 135, 0.3); color: var(--pink); }
        .cat-other { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #aaa; }

        /* --- MOBILE RESPONSIVENESS FIXES --- */
        @media (max-width: 768px) { 
            body { padding: 15px 10px; }
            .dashboard { grid-template-columns: 1fr; gap: 15px; } 
            .card { padding: 20px 15px; }
            
            /* Fix wide card height on mobile */
            .card.wide { height: auto; min-height: 500px; padding: 15px; }
            
            /* Center items cleanly */
            .log-header-row { flex-direction: column; align-items: center; gap: 15px; text-align: center; }
            .log-header-row h3 { width: 100%; text-align: center; }
            .glass-select { width: 100%; max-width: 320px; text-align: center; padding: 12px; }
            
            .card.wide::before {
                content: 'Swipe table left/right to view details →';
                display: block; text-align: center; font-size: 10px; color: var(--gold); 
                opacity: 0.7; margin-bottom: 15px; letter-spacing: 1px; width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>Activity Dashboard</h1>
            <p><span class="status-dot" id="live-dot"></span><span id="live-text">OFFLINE</span></p>
        </div>

        <div class="card">
            <h3>Total Logins</h3>
            <div class="value" id="visit-count">0</div>
            <div class="sub-value">Lifetime visits</div>
        </div>

        <div class="card">
            <h3>Last Seen</h3>
            <div class="value" style="font-size: clamp(20px, 4vw, 24px);" id="last-time">--</div>
            <div class="sub-value" id="last-date">Waiting for connection...</div>
        </div>

        <div class="card">
            <h3>Device Info</h3>
            <div class="value" style="font-size: clamp(20px, 4vw, 24px);" id="device-os">--</div>
            <div class="sub-value" id="device-browser">--</div>
        </div>

        <div class="card wide">
            <div class="log-header-row">
                <h3>LIVE ACTIVITY LOG</h3>
                <select id="category-filter" class="glass-select">
                    <option value="All">✦ View All Activity ✦</option>
                    <option value="System">System & Logins</option>
                    <option value="Interaction">Screen Interactions</option>
                    <option value="Media">Audio & Media</option>
                </select>
            </div>
            
            <div class="log-container">
                <table id="log-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">Time</th>
                            <th style="width: 15%;">Category</th>
                            <th style="width: 30%;">Action</th>
                            <th style="width: 40%;">Details</th>
                        </tr>
                    </thead>
                    <tbody id="log-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDfs0BvDVWG0-p3_D0VI_9GA0gkRxg4tg",
            authDomain: "login-page-64.firebaseapp.com",
            projectId: "login-page-64",
            storageBucket: "login-page-64.firebasestorage.app",
            messagingSenderId: "356749175989",
            appId: "1:356749175989:web:61f3e3a95f7014ae9ce2fc",
            measurementId: "G-X1Q4QLER72",
            databaseURL: "https://login-page-64-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        let allLogs = [];

        function getCategoryInfo(actionString) {
            const lowerAction = actionString.toLowerCase();
            if (lowerAction.includes("login") || lowerAction.includes("visit") || lowerAction.includes("sequence")) {
                return { name: "System", class: "cat-system" };
            }
            if (lowerAction.includes("music") || lowerAction.includes("audio") || lowerAction.includes("play")) {
                return { name: "Media", class: "cat-media" };
            }
            if (lowerAction.includes("interaction") || lowerAction.includes("wipe") || lowerAction.includes("mirror") || lowerAction.includes("box") || lowerAction.includes("supernova")) {
                return { name: "Interaction", class: "cat-interaction" };
            }
            return { name: "Other", class: "cat-other" };
        }

        function renderTable() {
            const logBody = document.getElementById("log-body");
            const filterValue = document.getElementById("category-filter").value;
            logBody.innerHTML = ""; 
            
            allLogs.forEach(log => {
                const catInfo = getCategoryInfo(log.action);
                if (filterValue !== "All" && catInfo.name !== filterValue) return; 

                const tr = document.createElement("tr");
                const timeStr = new Date(log.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                tr.innerHTML = `
                    <td class="log-time">${timeStr}</td>
                    <td><span class="cat-badge ${catInfo.class}">${catInfo.name}</span></td>
                    <td class="log-action">${log.action}</td>
                    <td class="log-details">${log.details || '—'}</td>
                `;
                logBody.appendChild(tr);
            });
        }

        database.ref('tracking/overview').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("visit-count").innerText = data.totalVisits || 0;
                if (data.lastLoginFull) {
                    const dateObj = new Date(data.lastLoginFull);
                    document.getElementById("last-time").innerText = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    document.getElementById("last-date").innerText = dateObj.toLocaleDateString();
                }
                document.getElementById("device-os").innerText = data.lastOS || "Unknown OS";
                document.getElementById("device-browser").innerText = data.lastBrowser || "Unknown Browser";
            }
        });

        database.ref('tracking/live/isOnline').on('value', (snapshot) => {
            const isOnline = snapshot.val();
            const dot = document.getElementById("live-dot");
            const text = document.getElementById("live-text");
            if (isOnline) {
                dot.classList.add("online"); text.innerText = "CHAHAT IS ONLINE"; text.style.color = "var(--gold)"; 
            } else {
                dot.classList.remove("online"); text.innerText = "OFFLINE"; text.style.color = "rgba(255,255,255,0.4)"; 
            }
        });

        database.ref('tracking/logs').limitToLast(100).on('value', (snapshot) => {
            allLogs = [];
            snapshot.forEach((child) => { allLogs.push(child.val()); });
            allLogs.reverse(); 
            renderTable(); 
        });

        document.getElementById("category-filter").addEventListener("change", renderTable);
    </script>
</body>
</html>
