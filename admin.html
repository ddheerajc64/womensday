<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Tracker</title>
    <style>
        body {
            background-color: #050505; color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .dashboard {
            background: #111; padding: 50px; border-radius: 15px;
            border: 1px solid #00ffcc; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            text-align: center; width: 400px;
        }
        h2 { margin: 0; font-size: 18px; color: #aaa; letter-spacing: 2px; }
        .number {
            font-size: 80px; font-weight: bold; margin: 20px 0;
            text-shadow: 0 0 20px #00ffcc;
        }
        .timestamp { font-size: 14px; color: #888; margin-top: 20px; }
        .timestamp span { color: #fff; }
        .status { margin-top: 30px; font-size: 12px; color: #00ffcc; animation: blink 1s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="dashboard">
        <h2>TOTAL UNIVERSE VISITS</h2>
        <div class="number" id="visit-count">--</div>
        
        <div class="timestamp">
            Last seen on:<br>
            <span id="last-time">Waiting for data...</span>
        </div>

        <div class="status">● LIVE TRACKING ACTIVE</div>
    </div>

    <script>
        // YOUR EXACT FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBDfs0BvDVWG0-p3_D0VI_9GA0gkRxg4tg",
            authDomain: "login-page-64.firebaseapp.com",
            projectId: "login-page-64",
            storageBucket: "login-page-64.firebasestorage.app",
            messagingSenderId: "356749175989",
            appId: "1:356749175989:web:61f3e3a95f7014ae9ce2fc",
            measurementId: "G-X1Q4QLER72",
            databaseURL: "https://login-page-64-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // Listen for live updates
        database.ref('tracking/visits').on('value', (snapshot) => {
            const visits = snapshot.val() || 0;
            document.getElementById("visit-count").innerText = visits;
        });

        database.ref('tracking/lastLogin').on('value', (snapshot) => {
            const lastTime = snapshot.val() || "Never";
            document.getElementById("last-time").innerText = lastTime;
        });
    </script>
</body>
</html>
